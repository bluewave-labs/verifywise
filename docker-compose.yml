version: "3.9"

services:
  postgresdb:
    image: postgres:16.8
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=$DB_USER
      - POSTGRES_PASSWORD=$DB_PASSWORD
      - POSTGRES_DB=$DB_NAME
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "$DB_USER", "-d", "$DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  backend:
    depends_on:
      postgresdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    image: ghcr.io/verifywise-ai/verifywise-backend:latest
    pull_policy: always
    ports:
      - $BACKEND_PORT:$BACKEND_PORT
    environment:
      - PORT=$BACKEND_PORT
      - DB_HOST=postgresdb
      - DB_USER=$DB_USER
      - DB_PORT=$DB_PORT
      - DB_PASSWORD=$DB_PASSWORD
      - DB_NAME=$DB_NAME
      - MOCK_DATA_ON=$MOCK_DATA_ON
      - JWT_SECRET=$JWT_SECRET
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - LLM_EVALS_URL=http://eval_server:8000
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=$ENCRYPTION_KEY
      - AI_GATEWAY_URL=http://ai_gateway:8100
      - AI_GATEWAY_INTERNAL_KEY=$AI_GATEWAY_INTERNAL_KEY
  frontend:
    depends_on:
      - backend
    image: ghcr.io/verifywise-ai/verifywise-frontend:latest
    pull_policy: always
  worker:
    depends_on:
      postgresdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    image: ghcr.io/verifywise-ai/verifywise-backend:latest
    pull_policy: always
    command: ["node", "dist/jobs/worker.js"]
    environment:
      - DB_HOST=postgresdb
      - DB_USER=$DB_USER
      - DB_PORT=$DB_PORT
      - DB_PASSWORD=$DB_PASSWORD
      - DB_NAME=$DB_NAME
      - JWT_SECRET=$JWT_SECRET
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=$ENCRYPTION_KEY
    restart: unless-stopped
  eval_server:
    depends_on:
      - backend
      - redis
    image: ghcr.io/verifywise-ai/verifywise-eval-server:latest
    expose:
      - "8000"
    volumes:
      - eval_uploads:/app/data/uploads
    environment:
      - DB_HOST=postgresdb
      - DB_USER=$DB_USER
      - DB_PORT=$DB_PORT
      - DB_PASSWORD=$DB_PASSWORD
      - DB_NAME=$DB_NAME
      - BACKEND_URL=http://backend:$BACKEND_PORT
      - REDIS_URL=redis://redis:6379/0
  ai_gateway:
    depends_on:
      - backend
      - redis
    image: ghcr.io/verifywise-ai/verifywise-ai-gateway:latest
    expose:
      - "8100"
    environment:
      - AI_GATEWAY_PORT=8100
      - INTERNAL_API_KEY=$AI_GATEWAY_INTERNAL_KEY
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped

volumes:
  db:
  eval_uploads:
